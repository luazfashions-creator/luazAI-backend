apiVersion: apps/v1
kind: Deployment
metadata:
  name: luazai-worker
  labels:
    app: luazai
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: luazai
      component: worker
  template:
    metadata:
      labels:
        app: luazai
        component: worker
    spec:
      containers:
        - name: worker
          image: luazai/backend:latest
          command: ['node', 'dist/main.js']
          env:
            - name: WORKER_MODE
              value: 'true'
          envFrom:
            - configMapRef:
                name: luazai-config
            - secretRef:
                name: luazai-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
