apiVersion: apps/v1
kind: Deployment
metadata:
  name: luazai-api
  labels:
    app: luazai
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: luazai
      component: api
  template:
    metadata:
      labels:
        app: luazai
        component: api
    spec:
      containers:
        - name: api
          image: luazai/backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: luazai-config
            - secretRef:
                name: luazai-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
